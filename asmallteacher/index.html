  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            vt: ['VT323', 'monospace'],
            px: ['Silkscreen', 'monospace'],
          },
          keyframes: {
            shake: {
              '0%,100%': { transform: 'translateX(0)' },
              '20%':      { transform: 'translateX(-6px)' },
              '40%':      { transform: 'translateX(6px)' },
              '60%':      { transform: 'translateX(-4px)' },
              '80%':      { transform: 'translateX(4px)' },
            },
            pop: {
              '0%,100%': { transform: 'scale(1)' },
              '40%':     { transform: 'scale(1.06)' },
            },
            blink: {
              '0%,100%': { opacity: '1' },
              '50%':     { opacity: '0' },
            },
          },
          animation: {
            shake: 'shake 0.35s ease',
            pop:   'pop 0.25s ease',
            blink: 'blink 1s step-end infinite',
          },
          boxShadow: {
            calc:              '0 20px 60px rgba(0,0,0,0.7), 0 4px 8px rgba(0,0,0,0.5), inset 0 2px 0 #ede0c8, inset 0 -2px 0 #7a5c35',
            display:           'inset 0 2px 8px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.08)',
            btn:               '0 3px 0 #6a4820, inset 0 1px 0 rgba(255,255,255,0.3)',

            'btn-op':          '0 3px 0 #7a3010, inset 0 1px 0 rgba(255,255,255,0.2)',
            'btn-op-press':    '0 1px 0 #7a3010, inset 0 1px 0 rgba(255,255,255,0.1)',
            'btn-enter':       '0 3px 0 #1a5c1a, inset 0 1px 0 rgba(255,255,255,0.2)',
            'btn-enter-press': '0 1px 0 #1a5c1a, inset 0 1px 0 rgba(255,255,255,0.1)',
            'btn-back':        '0 3px 0 #5a3820, inset 0 1px 0 rgba(255,255,255,0.2)',
            'btn-back-press':  '0 1px 0 #5a3820, inset 0 1px 0 rgba(255,255,255,0.1)',
          },
        },
      },
    }
  </script>
</head>

  <script>
    // ── Level → default ops ───────────────────────────────────────────────────
    const LEVEL_DEFAULT_OPS = {
      1: ['+'],
      2: ['+', '−'],
      3: ['+', '−', '×', '√', '^'],
      4: ['+', '−', '×', '÷', '√', '^'],
      5: ['+', '−', '×', '÷', '√', '^'],
    };

    // ── Problem generator ─────────────────────────────────────────────────────
    const LEVELS = {
      1: { minA: 0,  maxA: 9,   minB: 0, maxB: 9  },
      2: { minA: 0,  maxA: 9,   minB: 0, maxB: 9  },
      3: { minA: 10, maxA: 99,  minB: 1, maxB: 99 },
      4: { minA: 20, maxA: 99,  minB: 2, maxB: 20 },
      5: { minA: 50, maxA: 999, minB: 5, maxB: 50 },
    };

    const NEG_CHANCE_SUB = { 3: 0.3, 4: 0.45, 5: 0.6 };
    const NEG_CHANCE_MUL = { 4: 0.25, 5: 0.4 };
    const NEG_CHANCE_DIV = 0.35;
    const NEG_CHANCE_POW = { 4: 0.2, 5: 0.35 };

    const PERFECT_SQUARES = [4,9,16,25,36,49,64,81,100,121,144,169,196,225,256,289,324,361,400];

    function randRange(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function maybeNeg(v, c) { return Math.random() < c ? -v : v; }
    function round2(n) { return Math.round(n * 100) / 100; }

    function generateProblem(level, activeOps) {
      const cfg = LEVELS[level];
      const op = pick(activeOps);
      let a, b, answer;

      switch (op) {
        case '+':
          a = randRange(cfg.minA, cfg.maxA);
          b = randRange(cfg.minB, cfg.maxB);
          answer = a + b;
          break;

        case '−': {
          a = randRange(cfg.minA, cfg.maxA);
          const cs = NEG_CHANCE_SUB[level] || 0;
          b = (level >= 3 && Math.random() < cs)
            ? randRange(a + 1, cfg.maxA)
            : randRange(cfg.minB, Math.min(a, cfg.maxB));
          answer = a - b;
          break;
        }

        case '×': {
          const mMax = level >= 4 ? 20 : 12;
          a = randRange(2, Math.min(cfg.maxA, mMax));
          b = randRange(2, Math.min(cfg.maxB, mMax));
          if (level >= 4 && Math.random() < (NEG_CHANCE_MUL[level] || 0)) {
            if (Math.random() < 0.5) a = -a; else b = -b;
          }
          answer = a * b;
          break;
        }

        case '÷': {
          b = randRange(2, Math.min(cfg.maxB, 20));
          const maxQ = Math.floor(cfg.maxA / b);
          const minQ = level >= 5 ? 2 : 1;
          let q = randRange(minQ, Math.max(minQ, maxQ));
          if (level >= 5) q = maybeNeg(q, NEG_CHANCE_DIV);
          a = b * q;
          answer = q;
          break;
        }

        case '√': {
          if (level <= 3) {
            a = pick(PERFECT_SQUARES.filter(n => n <= 225));
            answer = Math.sqrt(a);
          } else if (level === 4) {
            if (Math.random() < 0.4) {
              a = pick(PERFECT_SQUARES);
              answer = Math.sqrt(a);
            } else {
              a = randRange(2, 200);
              answer = round2(Math.sqrt(a));
            }
          } else {
            if (Math.random() < 0.2) {
              a = pick(PERFECT_SQUARES);
              answer = Math.sqrt(a);
            } else {
              a = randRange(2, 500);
              answer = round2(Math.sqrt(a));
            }
          }
          b = 0;
          break;
        }

        case '^': {
          const maxExp = level >= 5 ? 4 : level >= 4 ? 3 : 2;
          b = randRange(2, maxExp);
          const maxBase = level >= 5 ? 15 : level >= 4 ? 12 : 9;
          a = randRange(2, maxBase);
          if (level >= 4 && Math.random() < (NEG_CHANCE_POW[level] || 0)) a = -a;
          answer = Math.pow(a, b);
          break;
        }
      }
      return { a, b, op, answer };
    }

    function isTooEasy({ a, b, op, answer }, level) {
      if (level <= 2) return false; // level 1-2 ranges are small, all problems are valid
      switch (op) {
        case '+': return a < 20 && b < 10;
        case '−': return Math.abs(a - b) < 5;
        case '×': return Math.abs(a) <= 5 || Math.abs(b) <= 5;
        case '÷': return Math.abs(a) < 30 || Math.abs(b) < 2;
        case '√': return answer < 3;
        case '^': return Math.abs(a) <= 1 || Math.abs(answer) < 8;
      }
    }

    function generateBalancedProblem(level, activeOps) {
      let p;
      do { p = generateProblem(level, activeOps); } while (isTooEasy(p, level));
      return p;
    }

    function formatProblem(p) {
      if (p.op === '√') return `√${p.a}`;
      if (p.op === '^') return `${p.a}^${p.b}`;
      return `${p.a} ${p.op} ${p.b}`;
    }

    function isDecimal(p) { return p.answer % 1 !== 0; }

    // ── State ─────────────────────────────────────────────────────────────────
    const MAX_ATTEMPTS   = 3;
    const PROBLEMS_TOTAL = 10;

    let state = {
      phase: 'idle', level: 1, activeOps: ['+'],
      problem: null, input: '', attempts: 0, num: 0, results: [], locked: false,
    };

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const $main      = document.getElementById('displayMain');
    const $label     = document.getElementById('displayLabel');
    const $progress  = document.getElementById('displayProgress');
    const $attempts  = document.getElementById('displayAttempts');
    const $keypad    = document.getElementById('keypad');
    const $scoreScr  = document.getElementById('scoreScreen');
    const $scoreRows = document.getElementById('scoreRows');
    const $scoreLvl  = document.getElementById('scoreLevelLabel');
    const $scoreTot  = document.getElementById('scoreTotalLabel');

    // ── Display helpers ───────────────────────────────────────────────────────
    const LCD = 'font-vt text-[42px] text-center leading-none flex items-center justify-center gap-2 min-h-[44px] relative z-10';
    const LCD_GREEN = LCD + ' text-[#9ee84a] [text-shadow:0_0_12px_rgba(158,232,74,0.4)]';
    const LCD_RED   = LCD + ' text-red-500 [text-shadow:0_0_12px_rgba(255,64,64,0.5)]';
    const LCD_AMBER = LCD + ' text-amber-400 [text-shadow:0_0_12px_rgba(255,200,64,0.5)]';
    const LCD_DIM   = LCD + ' text-[#1e3010]';

    function setDisplay(text, mode = '') {
      $main.className = mode === 'eee' ? LCD_RED : mode === 'good' ? LCD_AMBER : LCD_DIM;
      $main.textContent = text;
    }

    function renderInput() {
      const p = state.problem;
      const hint = isDecimal(p) ? '<span style="font-size:18px;opacity:0.6"> ≈2dp</span>' : '';
      $main.className = LCD_GREEN;
      $main.innerHTML =
        `<span>${formatProblem(p)} =</span>` +
        `<span>${state.input}</span>` +
        `<span class="inline-block w-[3px] h-9 bg-[#9ee84a] animate-blink align-middle ml-0.5"></span>` +
        hint;
    }

    function renderDots() {
      $attempts.innerHTML = '';
      for (let i = 0; i < MAX_ATTEMPTS; i++) {
        const d = document.createElement('div');
        d.className = 'w-[7px] h-[7px] rounded-full transition-colors duration-200 ' +
          (i < state.attempts ? 'bg-red-500' : 'bg-[#1e3010]');
        $attempts.appendChild(d);
      }
    }

    function animateEl(el, cls) {
      el.classList.remove(cls);
      void el.offsetWidth;
      el.classList.add(cls);
      el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
    }

    function flashKey(k) {
      const btn = document.querySelector(`[data-key="${k}"]`);
      if (!btn) return;
      const face = btn.querySelector('div');
      face.style.transform = 'translateY(2px)';
      setTimeout(() => face.style.transform = '', 120);
    }

    // ── Op selector ───────────────────────────────────────────────────────────
    function updateOpPills(ops) {
      document.querySelectorAll('[data-op]').forEach(p => {
        p.dataset.active = ops.includes(p.dataset.op) ? 'true' : 'false';
      });
    }

    function toggleOp(op) {
      const current = state.activeOps;
      const has = current.includes(op);
      // Don't allow deselecting the last op
      if (has && current.length === 1) return;
      state.activeOps = has ? current.filter(o => o !== op) : [...current, op];
      updateOpPills(state.activeOps);
    }

    // ── Level pills ───────────────────────────────────────────────────────────
    function updateLevelPills(n) {
      document.querySelectorAll('[data-key-level]').forEach(p => {
        p.dataset.active = (Number(p.dataset.keyLevel) === n).toString();
      });
    }

    // ── Game logic ────────────────────────────────────────────────────────────
    function setLevel(n) {
      state.locked    = false;
      state.level     = n;
      state.activeOps = [...LEVEL_DEFAULT_OPS[n]];
      updateLevelPills(n);
      updateOpPills(state.activeOps);
      startRound();
    }

    function startRound() {
      state.phase   = 'playing';
      state.num     = 0;
      state.results = [];
      $scoreScr.classList.add('hidden');
      $keypad.classList.remove('hidden');
      nextProblem();
    }

    function nextProblem() {
      state.num++;
      state.problem  = generateBalancedProblem(state.level, state.activeOps);
      state.input    = '';
      state.attempts = 0;
      $label.textContent = 'PROBLEM';
      $label.className   = 'font-vt text-sm text-[#9ee84a] tracking-widest';
      $progress.textContent = `${state.num}/${PROBLEMS_TOTAL}`;
      $progress.className   = 'font-vt text-sm text-[#9ee84a]';
      renderInput();
      renderDots();
    }

    function endRound() {
      state.phase = 'done';
      $keypad.classList.add('hidden');
      $scoreScr.classList.remove('hidden');
      $label.textContent = 'ROUND OVER';
      $label.className   = 'font-vt text-sm text-[#9ee84a] tracking-widest';
      $progress.textContent = '';
      $attempts.innerHTML   = '';

      const solved = state.results.filter(r => r.solved).length;
      const pct    = Math.round(solved / state.results.length * 100);
      setDisplay(pct === 100 ? '★★★' : pct >= 70 ? 'GOOD' : 'RETRY', pct >= 70 ? 'good' : 'eee');

      $scoreLvl.textContent = state.level;
      $scoreTot.textContent = `${solved}/${state.results.length}`;
      $scoreRows.innerHTML  = state.results.map(r => {
        const p  = r.problem;
        const eq = p.op === '√' ? `√${p.a} = ${p.answer}` :
                   p.op === '^' ? `${p.a}^${p.b} = ${p.answer}` :
                   `${p.a} ${p.op} ${p.b} = ${p.answer}`;
        return `<div class="flex items-center gap-2 py-1 font-vt text-base text-[#5a4020] border-b border-[rgba(122,92,53,0.2)] last:border-0">
          <span class="w-3.5 text-center ${r.solved ? 'text-green-700' : 'text-red-700'}">${r.solved ? '✓' : '✗'}</span>
          <span class="flex-1">${eq}</span>
          <span class="text-xs text-[#8a6840]">${r.attempts}×</span>
        </div>`;
      }).join('');
    }

    function submitAnswer() {
      const guess = parseFloat(state.input);
      if (isNaN(guess) || state.input === '' || state.input === '-') return;

      state.attempts++;
      renderDots();

      const decimal = isDecimal(state.problem);
      const correct = decimal
        ? round2(guess) === state.problem.answer
        : guess === state.problem.answer;

      if (correct) {
        state.results.push({ problem: state.problem, solved: true, attempts: state.attempts });
        state.locked = true;
        setDisplay('✓ ' + guess, 'good');
        animateEl(document.getElementById('professor'), 'animate-pop');
        setTimeout(() => {
          state.locked = false;
          if (state.num >= PROBLEMS_TOTAL) endRound(); else nextProblem();
        }, 800);

      } else if (state.attempts >= MAX_ATTEMPTS) {
        state.results.push({ problem: state.problem, solved: false, attempts: state.attempts });
        state.locked = true;
        setDisplay('EEE', 'eee');
        animateEl(document.getElementById('professor'), 'animate-shake');
        setTimeout(() => {
          setDisplay(String(state.problem.answer), 'eee');
          $label.textContent = 'ANSWER';
          setTimeout(() => {
            state.locked = false;
            if (state.num >= PROBLEMS_TOTAL) endRound(); else nextProblem();
          }, 1200);
        }, 600);

      } else {
        state.locked = true;
        setDisplay('EEE', 'eee');
        animateEl(document.getElementById('professor'), 'animate-shake');
        state.input = '';
        setTimeout(() => { state.locked = false; renderInput(); }, 700);
      }
    }

    function pressKey(k) {
      if (state.locked) return;

      if (state.phase === 'idle' || state.phase === 'done') {
        if (k === 'go' || k === 'enter') { startRound(); return; }
        return;
      }
      if (state.phase !== 'playing') return;

      if (k === 'back') { state.input = state.input.slice(0, -1); renderInput(); return; }
      if (k === 'neg') {
        if (state.input.startsWith('-')) state.input = state.input.slice(1);
        else if (state.input.length > 0) state.input = '-' + state.input;
        renderInput(); return;
      }
      if (k === '.') {
        if (state.input.includes('.')) return;
        if (state.input === '' || state.input === '-') state.input += '0';
        state.input += '.';
        renderInput(); return;
      }
      if (k === 'go' || k === 'enter') { submitAnswer(); return; }
      if (/^\d$/.test(k)) {
        if (state.input.replace('-', '').replace('.', '').length >= 6) return;
        state.input += k;
        renderInput();
      }
    }

    // ── Keyboard support ──────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') { flashKey(e.key); pressKey(e.key); }
      else if (e.key === 'Backspace') { flashKey('back');  pressKey('back'); }
      else if (e.key === 'Enter')     { flashKey('enter'); pressKey('enter'); }
      else if (e.key === '-')         { flashKey('neg');   pressKey('neg'); }
      else if (e.key === '.')         { flashKey('.');     pressKey('.'); }
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    updateLevelPills(1);
    updateOpPills(['+']);
    $main.className = LCD_GREEN.replace('text-[42px]', 'text-[20px]');
    $main.textContent = 'Select level to start';
  </script>
</body>
</html>
